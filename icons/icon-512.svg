<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a8a66" />
      <stop offset="100%" stop-color="#1b4332" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="4" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <g filter="url(#shadow)">
    <!-- Wrench -->
    <g transform="translate(256,256) rotate(45) translate(-256,-256)" fill="#ffffff">
      <!-- handle -->
      <rect x="236" y="150" width="40" height="212" rx="10"/>
      <!-- top head -->
      <circle cx="256" cy="140" r="46"/>
      <!-- hole in top head -->
      <circle cx="256" cy="125" r="22" fill="url(#bg)"/>
      <rect x="234" y="70" width="44" height="60" fill="url(#bg)"/>
      <!-- bottom head -->
      <circle cx="256" cy="370" r="36"/>
      <!-- hole in bottom head -->
      <circle cx="256" cy="370" r="18" fill="url(#bg)"/>
    </g>

    <!-- Screwdriver -->
    <g transform="translate(256,256) rotate(-45) translate(-256,-256)">
      <!-- handle -->
      <rect x="228" y="260" width="56" height="130" rx="14" fill="#e2e8f0"/>
      <!-- grip lines -->
      <rect x="238" y="280" width="8" height="90" rx="4" fill="#94a3b8"/>
      <rect x="266" y="280" width="8" height="90" rx="4" fill="#94a3b8"/>
      <!-- metallic shaft -->
      <rect x="244" y="130" width="24" height="140" fill="#f8fafc"/>
      <!-- flat head -->
      <polygon points="244,130 250,70 262,70 268,130" fill="#f1f5f9"/>
    </g>
  </g>
</svg>
